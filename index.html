<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Compare aircraft efficiency, fuel usage, crew needs, and more. Interactive radar chart and sortable aircraft table for Airline Manager 4." />
  <meta property="og:title"       content="AM4 Aircraft Efficiency Analyzer" />
  <meta property="og:description" content="Compare and evaluate aircraft performance visually." />
  <meta name="google-site-verification" content="OebpSrpdOOnlX1MwLxe4LWUMGTrTNdWLM9lb52rY8VM" />
  <title>AM4 Aircraft Efficiency Analyzer</title>
  <link rel="icon" href="images/icon.png" type="image/png" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Google Fonts: Rajdhani + IBM Plex Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Chart.js für Radar-Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    /**
     * i18n – Sprachverwaltung
     * ========================
     * Lädt Übersetzungen aus JSON-Dateien im /locales/-Ordner
     * und wendet sie auf alle UI-Elemente an.
     */

    // Aktuelle Übersetzungsdaten (global)
    let translations = {};
    let currentLang  = 'en';

    /**
     * Lädt und aktiviert eine Sprache.
     * Speichert die Auswahl in localStorage für nachfolgende Besuche.
     * @param {string} lang - Sprachcode z.B. 'en' oder 'de'
     */
    async function setLanguage(lang) {
      Logger.info('index.html', `Sprache wird geladen: "${lang}"`);
      try {
        const response = await fetch(`./locales/${lang}.json`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        translations = await response.json();
        currentLang  = lang;
        localStorage.setItem('language', lang);
        applyTranslations();
        Logger.info('index.html', `Sprache erfolgreich gesetzt: "${lang}"`);
      } catch (err) {
        Logger.error('index.html', `Fehler beim Laden der Sprache "${lang}":`, err);
      }
    }

    /**
     * Überträgt die geladenen Übersetzungen auf alle UI-Elemente.
     * Aktualisiert anschließend Tabelle und Chart.
     */
    function applyTranslations() {
      Logger.debug('index.html', 'applyTranslations() wird ausgeführt...');

      // Haupttitel
      const titleEl = document.getElementById('title');
      if (titleEl) titleEl.textContent = translations.title || 'Aircraft Efficiency Analyzer';

      // Dropdown-Labels
      const labelPrimary = document.getElementById('labelPrimary');
      const labelCompare = document.getElementById('labelCompare');
      if (labelPrimary) labelPrimary.textContent = translations.primary_aircraft || '✈️ Primary Aircraft';
      if (labelCompare) labelCompare.textContent = translations.compare_aircraft || '🔁 Compare Aircraft';

      // Tabellenkopf
      const thParam = document.getElementById('thParameter');
      const thVal   = document.getElementById('thValue');
      const thUnit  = document.getElementById('thUnit');
      if (thParam) thParam.textContent = translations.table_parameter || 'Parameter';
      if (thVal)   thVal.textContent   = translations.table_value     || 'Value';
      if (thUnit)  thUnit.textContent  = translations.table_unit      || 'Unit';

      // Footer-Texte
      const footerNote       = document.getElementById('footerNote');
      const footerDisclaimer = document.getElementById('footerDisclaimer');
      if (footerNote)       footerNote.textContent       = translations.footer_note       || '';
      if (footerDisclaimer) footerDisclaimer.textContent = translations.footer_disclaimer || '';

      // Settings-Menü Beschriftungen
      const labelGerman  = document.getElementById('labelGermanFormat');
      const labelShowCmp = document.getElementById('labelShowCompare');
      const labelRadar   = document.getElementById('labelRadarChart');
      const labelSupport = document.getElementById('labelSupport');
      if (labelGerman)  labelGerman.textContent  = translations.label_german_format || 'Use German number format';
      if (labelShowCmp) labelShowCmp.textContent = translations.label_show_compare   || 'Show comparison values';
      if (labelRadar)   labelRadar.textContent   = translations.label_radar_chart    || 'Radar Chart Parameters:';
      if (labelSupport) labelSupport.textContent = translations.label_support        || 'Support the project:';

      // Spenden-Link
      const donationText = document.getElementById('donationLinkText');
      if (donationText) donationText.textContent = translations.donation_link || '☕ Buy me a coffee';

      // Tabellen-Link
      const viewLink = document.getElementById('viewTableLink');
      if (viewLink && translations.view_table) viewLink.innerHTML = translations.view_table;

      // Radar-Toggle Labels dynamisch übersetzen
      document.querySelectorAll('.radar-toggle').forEach(el => {
        const key   = el.value.toLowerCase();
        const label = translations[key] || el.value;
        // Nextsibling ist der Text-Node nach der Checkbox
        if (el.nextSibling) el.nextSibling.textContent = ` ${label}`;
      });

      // Alle Elemente mit data-label-key Attribut übersetzen
      document.querySelectorAll('[data-label-key]').forEach(el => {
        const key = el.getAttribute('data-label-key');
        if (translations[key]) el.textContent = translations[key];
      });

      // Score-Box-Label aktualisieren (Wert bleibt erhalten)
      const scoreBox = document.getElementById('scoreBox');
      if (scoreBox) {
        const scoreMatch = scoreBox.innerHTML.match(/<strong>(.*?)<\/strong>/);
        const scoreVal   = scoreMatch ? scoreMatch[1] : '--';
        const diffMatch  = scoreBox.innerHTML.match(/<\/strong>(.*?)$/s);
        const diffHtml   = diffMatch ? diffMatch[1] : '/10';
        scoreBox.innerHTML = `🚀 ${translations.efficiency_score || 'Efficiency Score'}: <strong>${scoreVal}</strong>${diffHtml}`;
      }

      // UI-Komponenten neu rendern
      if (typeof updateRadarChartLabels === 'function') updateRadarChartLabels();
      if (typeof updateData            === 'function') updateData();

      Logger.debug('index.html', 'applyTranslations() abgeschlossen.');
    }

    // =============================================
    // DOM Loaded – Sprache und Einstellungen laden
    // =============================================
    document.addEventListener('DOMContentLoaded', () => {
      Logger.info('index.html', 'DOMContentLoaded – Initialisierung startet...');

      // Gespeicherte Sprache laden (Fallback: Englisch)
      const storedLang = localStorage.getItem('language') || 'en';
      setLanguage(storedLang);

      // Radar-Standard setzen (Erststart: alle aktiviert)
      if (!localStorage.getItem('selectedRadarParams')) {
        const allValues = Array.from(document.querySelectorAll('.radar-toggle')).map(el => el.value);
        localStorage.setItem('selectedRadarParams', JSON.stringify(allValues));
        Logger.debug('index.html', 'Erststart: Radar-Defaults in localStorage gespeichert.');
      }
    });
  </script>
</head>

<body class="dark-mode">
  <div class="container">

    <!-- ========================================
         Settings-Menü (Einstellungen)
         ======================================== -->
    <div class="settings-container">
      <button id="settingsBtn" class="settings-button" title="Settings / Einstellungen">⚙️</button>

      <div id="settingsMenu" class="settings-menu hidden">

        <!-- Sprachauswahl -->
        <div class="language-options">
          <span role="button" class="lang-flag" onclick="setLanguage('en')" title="English">🇬🇧</span>
          <span role="button" class="lang-flag" onclick="setLanguage('de')" title="Deutsch">🇩🇪</span>
        </div>

        <!-- Zahlenformat -->
        <div class="format-options">
          <label>
            <input type="checkbox" id="useGermanFormat" />
            <span id="labelGermanFormat">Use German number format (1.000,12)</span>
          </label>
        </div>

        <!-- Vergleichswerte in Tabelle -->
        <div class="compare-options">
          <label>
            <input type="checkbox" id="showCompareValues" />
            <span id="labelShowCompare">Show comparison values in table</span>
          </label>
        </div>

        <!-- Radar-Chart Parameter -->
        <div class="radar-options">
          <label><strong id="labelRadarChart">Radar Chart Parameters:</strong></label>
          <label><input type="checkbox" class="radar-toggle" value="price"                checked /> Price</label>
          <label><input type="checkbox" class="radar-toggle" value="fuel_consumption"     checked /> Fuel</label>
          <label><input type="checkbox" class="radar-toggle" value="cruise_speed"         checked /> Speed</label>
          <label><input type="checkbox" class="radar-toggle" value="a_check"              checked /> A-Check</label>
          <label><input type="checkbox" class="radar-toggle" value="crew_total"           checked /> Crew</label>
          <label><input type="checkbox" class="radar-toggle" value="co2_emission"         checked /> CO₂</label>
          <label><input type="checkbox" class="radar-toggle" value="runway_required"      checked /> Runway</label>
          <label><input type="checkbox" class="radar-toggle" value="service_ceiling"      checked /> Ceiling</label>
          <label><input type="checkbox" class="radar-toggle" value="engineers"            checked /> Engineers</label>
          <label><input type="checkbox" class="radar-toggle" value="tech"                 checked /> Tech</label>
          <label><input type="checkbox" class="radar-toggle" value="wingspan"             checked /> Wingspan</label>
          <label><input type="checkbox" class="radar-toggle" value="length"               checked /> Length</label>
        </div>

        <!-- Spenden-Bereich -->
        <div class="donation-section">
          <label><strong id="labelSupport">Support the project:</strong></label>
          <a href="https://buymeacoffee.com/poiscoding" target="_blank" rel="noopener noreferrer">
            <span id="donationLinkText">☕ Buy me a coffee</span>
          </a>
        </div>

        <!-- Einstellungen zurücksetzen -->
        <div class="reset-settings">
          <button onclick="resetLocalStorage()">🗑️ Reset all settings</button>
        </div>

      </div><!-- /settingsMenu -->
    </div><!-- /settings-container -->

    <!-- ========================================
         Haupttitel
         ======================================== -->
    <h1 id="title">Aircraft Efficiency Analyzer</h1>

    <!-- Link zur vollständigen Übersichtstabelle -->
    <a id="viewTableLink" href="aircraft-table.html">📊 View Full Aircraft Table</a>

    <!-- ========================================
         Flugzeug-Auswahl (Dropdowns)
         ======================================== -->
    <div class="dropdown-row">
      <!-- Primäres Flugzeug -->
      <div class="dropdown-column">
        <label for="aircraft1" class="dropdown-label" id="labelPrimary">✈️ Primary Aircraft</label>
        <select id="aircraft1" aria-label="Select primary aircraft"></select>
        <img id="img1" class="aircraft-image" src="" alt="Primary Aircraft" />
      </div>

      <!-- Vergleichs-Flugzeug -->
      <div class="dropdown-column">
        <label for="aircraft2" class="dropdown-label" id="labelCompare">🔁 Compare Aircraft</label>
        <select id="aircraft2" aria-label="Select aircraft to compare">
          <option value="">-- None --</option>
        </select>
        <img id="img2" class="aircraft-image" src="" alt="Comparison Aircraft" />
      </div>
    </div>

    <!-- ========================================
         Effizienz-Score Anzeige
         ======================================== -->
    <div class="score-box" id="scoreBox">
      🚀 Efficiency Score: <strong>--</strong>/10
    </div>

    <!-- ========================================
         Ergebnis: Tabelle + Radar-Chart
         ======================================== -->
    <div class="result-layout">
      <!-- Datentabelle mit scrollbarem Container für schmale Screens -->
      <div class="table-scroll-wrapper" style="flex: 1;">
        <table>
          <thead>
            <tr>
              <th id="thParameter">Parameter</th>
              <th id="thValue">Value</th>
              <th id="thUnit">Unit</th>
            </tr>
          </thead>
          <tbody id="data-table"></tbody>
        </table>
      </div>

      <!-- Radar-Chart -->
      <div class="chart-wrapper">
        <canvas id="efficiencyChart"></canvas>
      </div>
    </div>

  </div><!-- /container -->

  <!-- ========================================
       Footer
       ======================================== -->
  <footer class="language-footer">
    <div id="footerNote"></div>
    <div id="footerDisclaimer"></div>
  </footer>

  <!-- ========================================
       JavaScript – Reihenfolge wichtig!
       1. Logger muss zuerst geladen werden
       2. Dann Datenbasis (List + Data)
       3. Dann Berechnungen
       4. Zuletzt Hauptlogik
       ======================================== -->
  <script src="js/logger.js"></script>
  <script src="js/aircraftList.js"></script>
  <script src="js/aircraftData.js"></script>
  <script src="js/scoringUtils.js"></script>
  <script src="js/efficiencyScore.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
